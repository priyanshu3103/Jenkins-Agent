name: Build and Deploy Agent

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      tag:
        description: 'Custom image tag (leave empty to use git SHA)'
        required: false
        default: ''

env:
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
  ARGOCD_REPO: priyanshu3103/dev-argocd
  VALUES_FILE: charts/jenkins-agent/values.yaml

jobs:
  # ============ JOB 1 - BUILD ============
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      # ============ CHECKOUT ============
      - name: Checkout code
        uses: actions/checkout@v5

      # ============ SET IMAGE TAG ============
      - name: Set image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
            echo "✅ Image tag: ${{ github.event.inputs.tag }}"
          else
            BRANCH=$(echo ${{ github.ref_name }} | sed 's/\//-/g')
            SHORT_SHA=$(git rev-parse --short=7 HEAD)
            TAG="${BRANCH}-${SHORT_SHA}"
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
            echo "✅ Image tag: ${TAG}"
          fi

      # ============ LOGIN TO DOCKERHUB ============
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      # ============ SETUP DOCKER BUILDX ============
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      # ============ BUILD AND PUSH FRONTEND ============
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.frontend
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/jenkins-agent-frontend:${{ steps.tag.outputs.tag }}
            ${{ env.DOCKERHUB_USERNAME }}/jenkins-agent-frontend:latest

      # ============ BUILD AND PUSH BACKEND ============
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.backend
          push: true
          provenance: false
          sbom: false
          build-args: |
            JENKINS_ID=${{ vars.JENKINS_ID }}
            JENKINS_CREDS=${{ secrets.JENKINS_CREDS }}
            JENKINS_HOST=${{ vars.JENKINS_HOST }}
            JENKINS_JOBS=${{ vars.JENKINS_JOBS }}
            AGENT_API_KEY=${{ secrets.AGENT_API_KEY }}
            GEMINI_MODEL=${{ vars.GEMINI_MODEL }}
            SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}
            SLACK_CHANNEL=${{ vars.SLACK_CHANNEL }}
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/jenkins-agent-backend:${{ steps.tag.outputs.tag }}
            ${{ env.DOCKERHUB_USERNAME }}/jenkins-agent-backend:latest

  # ============ JOB 2 - DEPLOY ============
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      # ============ CHECKOUT ARGOCD REPO ============
      - name: Checkout ArgoCD repo
        uses: actions/checkout@v5
        with:
          repository: ${{ env.ARGOCD_REPO }}
          token: ${{ secrets.ARGOCD_REPO_TOKEN }}
          path: dev-argocd

      # ============ UPDATE HELM VALUES ============
      - name: Update image tags in values.yaml
        run: |
          cd dev-argocd
          TAG="${{ needs.build.outputs.tag }}"
          sed -i "s|tag: .* # frontend|tag: ${TAG} # frontend|g" ${{ env.VALUES_FILE }}
          sed -i "s|tag: .* # backend|tag: ${TAG} # backend|g" ${{ env.VALUES_FILE }}
          echo "✅ Updated image tags to ${TAG}"

      # ============ COMMIT AND PUSH ============
      - name: Commit and push values.yaml
        env:
          TOKEN: ${{ secrets.ARGOCD_REPO_TOKEN }}
        run: |
          cd dev-argocd
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git remote set-url origin https://${{ github.actor }}:${TOKEN}@github.com/${{ env.ARGOCD_REPO }}.git
          git add ${{ env.VALUES_FILE }}
          git commit -m "chore: update jenkins-agent image tags to ${{ needs.build.outputs.tag }}" || exit 0
          git push origin master
          echo "✅ Pushed to ${{ env.ARGOCD_REPO }}"
name: Build and Deploy Agent

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      tag:
        description: 'Custom image tag (leave empty to use git SHA)'
        required: false
        default: ''

env:
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
  ARGOCD_REPO: priyanshu3103/dev-argocd
  VALUES_FILE: charts/jenkins-agent/values.yaml

jobs:
  # ============ JOB 1 - BUILD ============
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}    # ← pass tag to deploy job

    steps:
      # ============ CHECKOUT ============
      - name: Checkout code
        uses: actions/checkout@v4

      # ============ SET IMAGE TAG ============
      - name: Set image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
            echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi
          echo "✅ Image tag: ${{ steps.tag.outputs.tag }}"

      # ============ LOGIN TO DOCKERHUB ============
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ============ BUILD AND PUSH FRONTEND ============
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.frontend
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/jenkins-agent-frontend:${{ steps.tag.outputs.tag }}
            ${{ env.DOCKERHUB_USERNAME }}/jenkins-agent-frontend:latest

      # ============ BUILD AND PUSH BACKEND ============
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.backend
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/jenkins-agent-backend:${{ steps.tag.outputs.tag }}
            ${{ env.DOCKERHUB_USERNAME }}/jenkins-agent-backend:latest

  # ============ JOB 2 - DEPLOY ============
  deploy:
    runs-on: ubuntu-latest
    needs: build    # ← runs after build job
    
    steps:
      # ============ CHECKOUT ARGOCD REPO ============
      - name: Checkout ArgoCD repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.ARGOCD_REPO }}
          token: ${{ secrets.ARGOCD_REPO_TOKEN }}
          path: dev-argocd

      # ============ UPDATE HELM VALUES ============
      - name: Update image tags in values.yaml
        run: |
          cd dev-argocd
          sed -i "s|tag:.*# frontend|tag: ${{ needs.build.outputs.tag }} # frontend|g" ${{ env.VALUES_FILE }}
          sed -i "s|tag:.*# backend|tag: ${{ needs.build.outputs.tag }} # backend|g" ${{ env.VALUES_FILE }}
          echo "✅ Updated image tags to ${{ needs.build.outputs.tag }}"

      # ============ COMMIT AND PUSH ============
      - name: Commit and push values.yaml
        env:
          TOKEN: ${{ secrets.ARGOCD_REPO_TOKEN }}
        run: |
          cd dev-argocd
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git remote set-url origin https://x-access-token:${TOKEN}@github.com/${{ env.ARGOCD_REPO }}.git
          git add ${{ env.VALUES_FILE }}
          git commit -m "chore: update jenkins-agent image tags to ${{ needs.build.outputs.tag }}" || exit 0
          git push origin master > /dev/null 2>&1
          echo "✅ Pushed to ${{ env.ARGOCD_REPO }}"